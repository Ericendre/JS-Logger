<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GKFlasher Live Logger</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0f1f2e;
        --bg-alt: #1a2f42;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-strong: rgba(255, 255, 255, 0.16);
        --text: #f3f7fb;
        --muted: #b7c7d9;
        --accent: #ffb347;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Bahnschrift", "Franklin Gothic Medium", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 600px at 10% 10%, #244a64 0%, var(--bg) 50%, #0b141e 100%);
      }

      header {
        padding: 24px clamp(16px, 4vw, 48px) 8px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(24px, 4vw, 36px);
        letter-spacing: 0.02em;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--panel);
        font-size: 13px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f39c12;
        box-shadow: 0 0 10px rgba(243, 156, 18, 0.6);
      }

      .controls {
        margin-top: 14px;
      }

      .button {
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        background: var(--accent);
        color: #1b1b1b;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
      }

      .button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      main {
        padding: 8px clamp(16px, 4vw, 48px) 48px;
      }

      .card {
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 16px;
        backdrop-filter: blur(10px);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead th {
        text-align: left;
        padding: 10px 12px;
        background: var(--panel-strong);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      tbody tr:nth-child(odd) {
        background: rgba(255, 255, 255, 0.03);
      }

      tbody td {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }

      .value {
        font-variant-numeric: tabular-nums;
        font-family: "Cascadia Mono", "Consolas", monospace;
        color: var(--accent);
        text-align: right;
      }

      .timestamp {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        thead {
          display: none;
        }

        tbody tr {
          display: grid;
          grid-template-columns: 1fr auto;
          gap: 8px;
          padding: 10px 0;
        }

        tbody td {
          border-bottom: none;
          padding: 6px 12px;
        }

        tbody td:first-child {
          color: var(--muted);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>GKFlasher Live Logger</h1>
      <p>Streaming ECU values from your car.</p>
      <div class="status" id="status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Connecting...</span>
      </div>
      <div class="controls">
        <button class="button" id="connect-button">Connect ECU</button>
      </div>
    </header>
    <main>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Parameter</th>
              <th style="text-align: right">Value</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div class="timestamp" id="timestamp"></div>
      </div>
    </main>
    <script>
      const body = document.getElementById("table-body");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const timestampEl = document.getElementById("timestamp");
      const connectButton = document.getElementById("connect-button");

      const valueCells = [];
      let labelsReady = false;

      function setStatus(text, state) {
        statusText.textContent = text;
        if (state === "ok") {
          statusDot.style.background = "#2ecc71";
          statusDot.style.boxShadow = "0 0 10px rgba(46, 204, 113, 0.6)";
          return;
        }
        if (state === "error") {
          statusDot.style.background = "#e74c3c";
          statusDot.style.boxShadow = "0 0 10px rgba(231, 76, 60, 0.6)";
          return;
        }
        statusDot.style.background = "#f39c12";
        statusDot.style.boxShadow = "0 0 10px rgba(243, 156, 18, 0.6)";
      }

      function buildTable(labels) {
        body.innerHTML = "";
        valueCells.length = 0;
        labels.forEach((label) => {
          const row = document.createElement("tr");
          const nameCell = document.createElement("td");
          const valueCell = document.createElement("td");
          nameCell.textContent = label;
          valueCell.className = "value";
          valueCell.textContent = "--";
          row.appendChild(nameCell);
          row.appendChild(valueCell);
          body.appendChild(row);
          valueCells.push(valueCell);
        });
        labelsReady = true;
      }

      function updateValues(sample) {
        if (!labelsReady) {
          return;
        }
        sample.values.forEach((value, index) => {
          if (valueCells[index]) {
            valueCells[index].textContent = value;
          }
        });
        const date = new Date(sample.ts);
        timestampEl.textContent = `Last update: ${date.toLocaleTimeString()}`;
      }

      async function fetchStatus() {
        try {
          const response = await fetch("/status");
          const status = await response.json();
          if (status.connected) {
            setStatus("Live", "ok");
            connectButton.disabled = true;
            return;
          }
          if (status.connecting) {
            setStatus("Connecting to ECU...", "warn");
            connectButton.disabled = true;
            return;
          }
          if (status.error) {
            setStatus(`ECU error: ${status.error}`, "error");
            connectButton.disabled = false;
            return;
          }
          setStatus("ECU not connected", "warn");
          connectButton.disabled = false;
        } catch (error) {
          setStatus("Server not reachable", "error");
          connectButton.disabled = false;
        }
      }

      async function requestConnect() {
        connectButton.disabled = true;
        try {
          await fetch("/connect", { method: "POST" });
        } catch (error) {
          setStatus("Connect request failed", "error");
        }
        fetchStatus();
      }

      function connect() {
        const source = new EventSource("/stream");
        setStatus("Connecting...", "warn");

        source.addEventListener("labels", (event) => {
          const labels = JSON.parse(event.data);
          buildTable(labels);
        });

        source.addEventListener("sample", (event) => {
          const sample = JSON.parse(event.data);
          updateValues(sample);
        });

        source.addEventListener("error", () => {
          setStatus("Reconnecting...", "warn");
        });
      }

      connect();
      fetchStatus();
      setInterval(fetchStatus, 3000);
      connectButton.addEventListener("click", requestConnect);
    </script>
  </body>
</html>
