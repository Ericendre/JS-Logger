<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GKFlasher Live Logger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.24/dist/uPlot.min.css" />
    <style>
      :root {
        color-scheme: light;
        --bg: #0f1f2e;
        --bg-alt: #1a2f42;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-strong: rgba(255, 255, 255, 0.16);
        --text: #f3f7fb;
        --muted: #b7c7d9;
        --accent: #ffb347;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: "Bahnschrift", "Franklin Gothic Medium", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 600px at 10% 10%, #244a64 0%, var(--bg) 50%, #0b141e 100%);
        overflow: hidden;
      }

      header {
        padding: 24px clamp(16px, 4vw, 48px) 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(24px, 4vw, 36px);
        letter-spacing: 0.02em;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--panel);
        font-size: 13px;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f39c12;
        box-shadow: 0 0 10px rgba(243, 156, 18, 0.6);
      }

      .controls {
        margin-top: 0;
      }

      .button {
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        background: var(--accent);
        color: #1b1b1b;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
      }

      .button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      main {
        padding: 8px clamp(16px, 4vw, 48px) 24px;
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        gap: 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 16px;
        backdrop-filter: blur(10px);
        overflow: hidden;
      }

      .tabs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .tab {
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
      }

      .tab.active {
        background: var(--panel-strong);
        border-color: rgba(255, 255, 255, 0.2);
        color: var(--accent);
      }

      .tab-panel {
        display: none;
        flex: 1;
      }

      .tab-panel.active {
        display: block;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .panel-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(4, 9, 14, 0.7);
        z-index: 10;
      }

      .overlay.active {
        display: flex;
      }

      .overlay-card {
        width: min(560px, 90vw);
        max-height: 80vh;
        background: rgba(15, 31, 46, 0.98);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .overlay-list {
        overflow: auto;
        padding-right: 6px;
        display: grid;
        gap: 8px;
      }

      .overlay-group {
        display: grid;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .overlay-group-title {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .overlay-item {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .overlay-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .overlay-field {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      .value-input {
        width: 100%;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 8px 10px;
        font-size: 13px;
      }

      .icon-button {
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.05);
        cursor: pointer;
      }

      .icon-button svg {
        width: 16px;
        height: 16px;
        fill: #ffffff;
      }

      .tab-panel.panel-split {
        display: none;
        flex-direction: column;
        gap: 12px;
        height: 100%;
        min-height: 0;
      }

      .tab-panel.panel-split.active {
        display: flex;
      }

      .panel-grid {
        flex: 1;
        display: grid;
        gap: 12px;
        min-height: 0;
      }

      .panel-splitter {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 14px;
        cursor: row-resize;
        user-select: none;
      }

      .panel-splitter::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 1px;
        background: rgba(255, 255, 255, 0.12);
      }

      .panel-split-handle {
        width: 120px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.35);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.12);
      }

      .panel-splitter:hover .panel-split-handle {
        background: rgba(255, 255, 255, 0.6);
      }

      .panel-cell {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }

      .panel-gear {
        position: absolute;
        top: 10px;
        right: 10px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 3;
      }

      .panel-cell:hover .panel-gear {
        opacity: 1;
        pointer-events: auto;
      }

      .panel-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 22px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        pointer-events: auto;
        position: relative;
        z-index: 1;
      }

      .panel-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: inline-block;
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        pointer-events: auto;
        cursor: pointer;
        z-index: 2;
      }

      .panel-label span:last-child {
        pointer-events: none;
      }

      .panel-value {
        flex: 1;
        display: flex;
        align-items: flex-end;
        font-size: clamp(48px, 9vw, 96px);
        font-weight: 700;
        color: #ffffff;
        line-height: 1;
      }

      .panel-bottom {
        flex: 1;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 14px;
        padding: 12px;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .chart-wrapper {
        position: relative;
        width: 100%;
        flex: 1;
        min-height: 0;
      }

      #history-chart {
        width: 100%;
        height: 100%;
      }

      .chart-tooltip {
        position: absolute;
        opacity: 0;
        pointer-events: none;
        background: rgba(10, 18, 26, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 10px 12px;
        color: var(--text);
        font-size: 12px;
        transform: translate(-50%, -110%);
        white-space: nowrap;
      }

      .chart-tooltip strong {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .chart-tooltip span {
        display: block;
      }

      .chart-controls {
        margin-top: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      #chart-slider {
        flex: 1;
        accent-color: var(--accent);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead th {
        text-align: left;
        padding: 10px 12px;
        background: var(--panel-strong);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      tbody tr:nth-child(odd) {
        background: rgba(255, 255, 255, 0.03);
      }

      tbody td {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }

      .value {
        font-variant-numeric: tabular-nums;
        font-family: "Cascadia Mono", "Consolas", monospace;
        color: var(--accent);
        text-align: right;
      }

      .timestamp {
        font-size: 12px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        thead {
          display: none;
        }

        tbody tr {
          display: grid;
          grid-template-columns: 1fr auto;
          gap: 8px;
          padding: 10px 0;
        }

        tbody td {
          border-bottom: none;
          padding: 6px 12px;
        }

        tbody td:first-child {
          color: var(--muted);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>GKFlasher Live Logger</h1>
        <p>Streaming ECU values from your car.</p>
      </div>
      <div class="header-right">
        <div class="status" id="status">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">Connecting...</span>
          <span id="status-hz">Hz: --</span>
          <span id="ble-status">BLE: off</span>
        </div>
        <div class="controls">
          <button class="button" id="connect-button">Connect ECU</button>
          <button class="button" id="ble-connect-button">Connect BLE</button>
        </div>
      </div>
    </header>

    <main>
      <div class="tabs">
        <button class="tab" data-tab="overview">Overview</button>
        <button class="tab active" data-tab="raw">Raw Data</button>
        <button class="tab" data-tab="settings">Settings</button>
      </div>

      <div class="card tab-panel panel-split" data-panel="overview">
        <div class="panel-header">
          <strong>Panel</strong>
          <button class="button" id="panel-settings">Settings</button>
        </div>
        <div class="panel-grid" id="panel-grid"></div>
        <div class="panel-splitter" id="panel-splitter">
          <div class="panel-split-handle"></div>
        </div>
        <div class="panel-bottom">
          <div class="chart-wrapper">
            <div id="history-chart"></div>
            <div class="chart-tooltip" id="chart-tooltip"></div>
          </div>
          <div class="chart-controls">
            <button class="button" id="chart-toggle">Pause</button>
          </div>
        </div>
      </div>
      
      <div class="card tab-panel active" data-panel="raw">
        <div class="panel-header">
          <strong>Raw data</strong>
          <div class="panel-actions">
            <button class="button" id="options-button">Options</button>
            <button class="button" id="ble-log-button">BLE log</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Parameter</th>
              <th style="text-align: right">Value</th>
              <th style="text-align: center">Options</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div class="timestamp" id="timestamp"></div>
      </div>
      
      <div class="card tab-panel" data-panel="settings">
        <p>Simulation locale des donnees (sans ECU).</p>
        <div class="controls">
          <button class="button" id="simulate-button">Start simulation</button>
        </div>
      </div>
    </main>
    <div class="overlay" id="options-overlay">
      <div class="overlay-card">
        <div class="panel-header">
          <strong>Afficher / cacher les valeurs</strong>
          <button class="button" id="options-close">Fermer</button>
        </div>
        <div class="overlay-list" id="options-list"></div>
        <div class="overlay-actions">
          <button class="button" id="options-show-all">Tout afficher</button>
          <button class="button" id="options-hide-all">Tout cacher</button>
        </div>
      </div>
    </div>
    <div class="overlay" id="ble-log-overlay">
      <div class="overlay-card">
        <div class="panel-header">
          <strong>BLE log</strong>
          <button class="button" id="ble-log-close">Fermer</button>
        </div>
        <pre id="ble-log-content" style="margin: 0; min-height: 200px; max-height: 60vh; overflow: auto; background: rgba(255, 255, 255, 0.06); padding: 12px; border-radius: 12px;">Aucun log pour l'instant.</pre>
      </div>
    </div>
    <div class="overlay" id="value-overlay">
      <div class="overlay-card">
        <div class="panel-header">
          <strong id="value-title">Options</strong>
          <button class="button" id="value-close">Fermer</button>
        </div>
        <div class="overlay-field">
          <label for="value-decimals">Decimales</label>
          <input class="value-input" id="value-decimals" type="number" min="0" max="6" placeholder="auto" />
        </div>
        <div class="overlay-field">
          <label for="value-alias">Alias</label>
          <input class="value-input" id="value-alias" type="text" placeholder="Nom court" />
        </div>
        <div class="overlay-field">
          <label for="value-scale-min">Echelle min</label>
          <input class="value-input" id="value-scale-min" type="number" step="0.01" placeholder="auto" />
        </div>
        <div class="overlay-field">
          <label for="value-scale-max">Echelle max</label>
          <input class="value-input" id="value-scale-max" type="number" step="0.01" placeholder="auto" />
        </div>
        <div class="overlay-actions">
          <button class="button" id="value-save">Appliquer</button>
          <button class="button" id="value-clear">Auto</button>
        </div>
      </div>
    </div>
    <div class="overlay" id="panel-overlay">
      <div class="overlay-card">
        <div class="panel-header">
          <strong>Panel settings</strong>
          <button class="button" id="panel-close">Fermer</button>
        </div>
        <div class="overlay-field">
          <label for="panel-rows">Lignes</label>
          <input class="value-input" id="panel-rows" type="number" min="1" max="6" />
        </div>
        <div class="overlay-field">
          <label for="panel-cols">Colonnes</label>
          <input class="value-input" id="panel-cols" type="number" min="1" max="6" />
        </div>
        <div class="overlay-actions">
          <button class="button" id="panel-apply">Appliquer</button>
        </div>
      </div>
    </div>
    <div class="overlay" id="cell-overlay">
      <div class="overlay-card">
        <div class="panel-header">
          <strong id="cell-title">Cellule</strong>
          <button class="button" id="cell-close">Fermer</button>
        </div>
        <div class="overlay-field">
          <label for="cell-select">Valeur</label>
          <select class="value-input" id="cell-select"></select>
        </div>
        <div class="overlay-actions">
          <button class="button" id="cell-apply">Appliquer</button>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.24/dist/uPlot.iife.min.js"></script>
    <script>
      const body = document.getElementById("table-body");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const statusHz = document.getElementById("status-hz");
      const timestampEl = document.getElementById("timestamp");
      const connectButton = document.getElementById("connect-button");
      const bleConnectButton = document.getElementById("ble-connect-button");
      const bleStatus = document.getElementById("ble-status");
      const simulateButton = document.getElementById("simulate-button");
      const optionsButton = document.getElementById("options-button");
      const optionsOverlay = document.getElementById("options-overlay");
      const optionsList = document.getElementById("options-list");
      const optionsClose = document.getElementById("options-close");
      const optionsShowAll = document.getElementById("options-show-all");
      const optionsHideAll = document.getElementById("options-hide-all");
      const bleLogButton = document.getElementById("ble-log-button");
      const bleLogOverlay = document.getElementById("ble-log-overlay");
      const bleLogClose = document.getElementById("ble-log-close");
      const bleLogContent = document.getElementById("ble-log-content");
      const valueOverlay = document.getElementById("value-overlay");
      const valueTitle = document.getElementById("value-title");
      const valueDecimals = document.getElementById("value-decimals");
      const valueAlias = document.getElementById("value-alias");
      const valueScaleMin = document.getElementById("value-scale-min");
      const valueScaleMax = document.getElementById("value-scale-max");
      const valueSave = document.getElementById("value-save");
      const valueClear = document.getElementById("value-clear");
      const valueClose = document.getElementById("value-close");
      const panelSettings = document.getElementById("panel-settings");
      const panelOverlay = document.getElementById("panel-overlay");
      const panelRows = document.getElementById("panel-rows");
      const panelCols = document.getElementById("panel-cols");
      const panelApply = document.getElementById("panel-apply");
      const panelClose = document.getElementById("panel-close");
      const panelGrid = document.getElementById("panel-grid");
      const panelBottom = document.querySelector(".panel-bottom");
      const panelSplitter = document.getElementById("panel-splitter");
      const chartRoot = document.getElementById("history-chart");
      const chartTooltip = document.getElementById("chart-tooltip");
      const chartToggle = document.getElementById("chart-toggle");
      const cellOverlay = document.getElementById("cell-overlay");
      const cellTitle = document.getElementById("cell-title");
      const cellSelect = document.getElementById("cell-select");
      const cellApply = document.getElementById("cell-apply");
      const cellClose = document.getElementById("cell-close");
      const tabs = Array.from(document.querySelectorAll(".tab"));
      const panels = Array.from(document.querySelectorAll(".tab-panel"));

      const valueCells = [];
      let labelsReady = false;
      let sampleCount = 0;
      let lastHzTime = performance.now();
      let currentLabels = [];
      let baseLabels = [];
      const bleExtraLabels = [];
      const bleExtraValues = new Map();
      let simulateOn = false;
      let simulateTimer = null;
      const simState = {
        t: 0,
        speed: 0,
        rpm: 800,
        load: 0.2,
        coolant: 70,
        oil: 65,
        intake: 25,
        voltage: 13.6,
        fuelTrim: 0,
      };
      const hiddenLabels = new Set();
      const hiddenStorageKey = "gkflasher.hiddenLabels";
      const aliasMap = new Map();
      const aliasStorageKey = "gkflasher.aliasMap";
      const valueDecimalsMap = new Map();
      const valueStorageKey = "gkflasher.valueDecimals";
      const valueScaleMap = new Map();
      const valueScaleKey = "gkflasher.valueScale";
      const valueCellMap = new Map();
      const labelIndexMap = new Map();
      let lastSample = null;
      let activeValueLabel = null;
      const panelConfig = { rows: 2, cols: 3, assignments: [] };
      const panelStorageKey = "gkflasher.panelConfig";
      const panelSplitKey = "gkflasher.panelSplit";
      let panelCells = [];
      let activePanelCellIndex = null;
      const historyWindowMs = 30000;
      const historyTimestamps = [];
      const historySeries = new Map();
      const hiddenSeries = new Set();
      const hiddenSeriesKey = "gkflasher.hiddenSeries";
      const chartColorMap = new Map();
      let historyChart = null;
      let chartSeriesLabels = [];
      let chartSeriesNames = [];
      let chartResizeObserver = null;
      const chartColors = ["#f39c12", "#2ecc71", "#3498db", "#e74c3c", "#9b59b6", "#1abc9c", "#f1c40f"];
      let chartPaused = false;
      let pauseOffsetMs = 0;
      let pauseStartTs = null;
      let pauseLatestTs = null;
      let chartLastTs = null;
      let chartRenderPending = false;
      let chartLastRender = 0;
      const chartRenderIntervalMs = 50;

      const engineDisplacementL = 1.975;
      const engineCylinders = 4;
      const airDensityGPerL = 1.184;

      const computedDefs = [
        {
          label: "MAF (mg/stroke)",
          compute: (labels, values) => {
            const mafIndex = findIndexByContains(labels, ["air flow rate from mass air flow sensor", "maf"], "kg/h");
            const rpmIndex = findIndexByContains(labels, ["engine speed", "rpm"], "rpm");
            if (mafIndex === -1 || rpmIndex === -1) {
              return null;
            }
            const mafKgH = Number(values[mafIndex]);
            const rpm = Number(values[rpmIndex]);
            if (!Number.isFinite(mafKgH) || !Number.isFinite(rpm) || rpm <= 0) {
              return null;
            }
            const gPerSec = (mafKgH * 1000) / 3600;
            const strokesPerSecPerCyl = (rpm / 60) / 2;
            const totalStrokesPerSec = strokesPerSecPerCyl * engineCylinders;
            if (totalStrokesPerSec <= 0) {
              return null;
            }
            return (gPerSec / totalStrokesPerSec) * 1000;
          },
        },
        {
          label: "VE (%)",
          compute: (labels, values) => {
            const mafIndex = findIndexByContains(labels, ["air flow rate from mass air flow sensor", "maf"], "kg/h");
            const rpmIndex = findIndexByContains(labels, ["engine speed", "rpm"], "rpm");
            if (mafIndex === -1 || rpmIndex === -1) {
              return null;
            }
            const mafKgH = Number(values[mafIndex]);
            const rpm = Number(values[rpmIndex]);
            if (!Number.isFinite(mafKgH) || !Number.isFinite(rpm) || rpm <= 0) {
              return null;
            }
            const gPerSec = (mafKgH * 1000) / 3600;
            const strokesPerSecPerCyl = (rpm / 60) / 2;
            const totalStrokesPerSec = strokesPerSecPerCyl * engineCylinders;
            if (totalStrokesPerSec <= 0) {
              return null;
            }
            const mgPerStroke = (gPerSec / totalStrokesPerSec) * 1000;
            const iatIndex = findIndexByContains(labels, ["intake air temperature", "iat"], "c");
            let densityGPerL = airDensityGPerL;
            if (iatIndex !== -1) {
              const iatC = Number(values[iatIndex]);
              const rhoKgM3 = airDensityFromIat(iatC);
              if (rhoKgM3) {
                densityGPerL = rhoKgM3;
              }
            }
            const mgAt100 = (engineDisplacementL / engineCylinders) * densityGPerL * 1000;
            if (mgAt100 <= 0) {
              return null;
            }
            return (mgPerStroke / mgAt100) * 100;
          },
        },
      ];

      function airDensityFromIat(iatC) {
        const tempK = iatC + 273.15;
        if (!Number.isFinite(tempK) || tempK <= 0) {
          return null;
        }
        const pressurePa = 101325;
        const R = 287.05;
        const rhoKgPerM3 = pressurePa / (R * tempK);
        return rhoKgPerM3; // kg/m^3
      }

      function findIndexByContains(labels, substrings, unitHint) {
        for (let i = 0; i < labels.length; i += 1) {
          const label = labels[i].toLowerCase();
          const hasUnit = unitHint ? label.includes(`(${unitHint}`) : true;
          if (!hasUnit) {
            continue;
          }
          for (const token of substrings) {
            if (label.includes(token)) {
              return i;
            }
          }
        }
        return -1;
      }

      function extendLabels(labels) {
        const computed = computedDefs.map((def) => def.label);
        return labels.concat(computed);
      }

      function setBaseLabels(labels) {
        baseLabels = Array.isArray(labels) ? labels.slice() : [];
      }

      function getCombinedLabels() {
        return baseLabels.concat(bleExtraLabels);
      }

      function computeDerivedValues(labels, values) {
        const derived = [];
        computedDefs.forEach((def) => {
          const val = def.compute(labels, values);
          if (val === null) {
            derived.push("--");
            return;
          }
          if (def.label === "VE (%)") {
            derived.push(Number(val.toFixed(1)));
            return;
          }
          derived.push(Number(val.toFixed(3)));
        });
        return derived;
      }

      const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
      const TX_CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
      let bleDevice = null;
      let bleServer = null;
      let bleService = null;
      let bleTxChar = null;
      const bleDecoder = new TextDecoder();
      let bleBuffer = "";
      const bleLogLines = [];
      const bleLogMax = 500;

      function appendBleLog(line) {
        if (!bleLogContent) {
          return;
        }
        if (!line) {
          return;
        }
        bleLogLines.push(line);
        if (bleLogLines.length > bleLogMax) {
          bleLogLines.splice(0, bleLogLines.length - bleLogMax);
        }
        bleLogContent.textContent = bleLogLines.join("\n");
        bleLogContent.scrollTop = bleLogContent.scrollHeight;
      }

      function onBleNotify(event) {
        const data = event.target.value;
        if (!data) {
          return;
        }
        bleBuffer += bleDecoder.decode(data, { stream: true });
        let idx = 0;
        while ((idx = bleBuffer.indexOf("\n")) >= 0) {
          const line = bleBuffer.slice(0, idx).trim();
          bleBuffer = bleBuffer.slice(idx + 1);
          if (line) {
            appendBleLog(line);
            handleBleLogLine(line);
          }
        }
      }


      function handleBleLogLine(line) {
        const match = line.match(/^\s*([^:]+?)\s*:\s*([-+]?\d+(?:\.\d+)?)/);
        if (!match) {
          return;
        }
        const label = match[1].trim();
        const value = Number(match[2]);
        if (!label || !Number.isFinite(value)) {
          return;
        }
        const isNew = !bleExtraValues.has(label);
        bleExtraValues.set(label, value);
        if (isNew) {
          bleExtraLabels.push(label);
          buildTable(extendLabels(getCombinedLabels()));
          return;
        }
        const cell = valueCellMap.get(label);
        if (cell) {
          cell.textContent = formatValue(value, label);
        }
        const idx = labelIndexMap.get(label);
        if (lastSample && idx !== undefined) {
          lastSample.values[idx] = value;
          updatePanelValues(lastSample);
          const chartSample = { ts: Date.now(), values: lastSample.values.slice() };
          updateHistoryChart(chartSample);
        } else if (!lastSample && currentLabels.length) {
          const values = currentLabels.map((name) => bleExtraValues.get(name) ?? "--");
          lastSample = { ts: Date.now(), values };
          updatePanelValues(lastSample);
          updateHistoryChart(lastSample);
        }
      }

      function setBleStatus(textValue) {
        if (bleStatus) {
          bleStatus.textContent = `BLE: ${textValue}`;
        }
      }

      function setBleUiConnected(connected) {
        if (bleConnectButton) {
          bleConnectButton.textContent = connected ? "Disconnect BLE" : "Connect BLE";
        }
      }

      async function connectBle() {
        if (!navigator.bluetooth) {
          setBleStatus("unsupported");
          return;
        }
        if (bleDevice && bleDevice.gatt && bleDevice.gatt.connected) {
          bleDevice.gatt.disconnect();
          setBleStatus("off");
          setBleUiConnected(false);
          return;
        }
        try {
          setBleStatus("search...");
          bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "ESP32" }],
            optionalServices: [SERVICE_UUID],
          });
          bleDevice.addEventListener("gattserverdisconnected", () => {
            setBleStatus("off");
            setBleUiConnected(false);
          });
          bleServer = await bleDevice.gatt.connect();
          bleService = await bleServer.getPrimaryService(SERVICE_UUID);
          bleTxChar = await bleService.getCharacteristic(TX_CHAR_UUID);
          await bleTxChar.startNotifications();
          bleTxChar.addEventListener("characteristicvaluechanged", onBleNotify);
          setBleStatus("connected");
          setBleUiConnected(true);
          if (simulateOn) {
            stopSimulation();
          }
        } catch (error) {
          setBleStatus("error");
          setBleUiConnected(false);
        }
      }

      function formatValue(value, label) {
        if (!valueDecimalsMap.has(label)) {
          return value;
        }
        const decimals = valueDecimalsMap.get(label);
        const num = Number(value);
        if (!Number.isFinite(num)) {
          return value;
        }
        return num.toFixed(decimals);
      }

      function updateValues(sample) {
        if (!labelsReady) {
          return;
        }
        const combinedLabels = getCombinedLabels();
        const bleValues = bleExtraLabels.map((label) => bleExtraValues.get(label) ?? "--");
        const combinedValues = sample.values.concat(bleValues);
        const derived = computeDerivedValues(combinedLabels, combinedValues);
        const extendedSample = { ts: sample.ts, values: combinedValues.concat(derived) };
        lastSample = extendedSample;
        currentLabels.forEach((label, index) => {
          const cell = valueCellMap.get(label);
          if (!cell) {
            return;
          }
          const value = extendedSample.values[index];
          cell.textContent = formatValue(value, label);
        });
        const date = new Date(sample.ts);
        timestampEl.textContent = `Last update: ${date.toLocaleTimeString()}`;
        updatePanelValues(extendedSample);
        updateHistoryChart(extendedSample);
      }

      async function fetchStatus() {
        try {
          const response = await fetch("/status");
          const status = await response.json();
          if (status.connected) {
            setStatus("Live", "ok");
            connectButton.disabled = true;
            return;

          if (status.connecting) {
            setStatus("Connecting to ECU...", "warn");

            return;

          if (status.error) {
            setStatus(`ECU error: ${status.error}`, "error");
            connectButton.disabled = false;
            return;
          }
          setStatus("ECU not connected", "warn");
          connectButton.disabled = false;
        } catch (error) {

        connectButton.disabled = true;

          await fetch("/connect", { method: "POST" });

          setStatus("Connect request failed", "error");

      function randomInRange(min, max, decimals) {
        const value = min + Math.random() * (max - min);
        return Number(value.toFixed(decimals));
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function updateSimState() {
        simState.t += 0.2;
        const wave = Math.sin(simState.t / 3);
        const accel = clamp((wave + 1) / 2, 0, 1);
        const targetSpeed = accel * 120;
        simState.speed += (targetSpeed - simState.speed) * 0.08;
        simState.load = clamp(0.2 + accel * 0.7 + Math.sin(simState.t / 7) * 0.05, 0.1, 1);
        simState.rpm = clamp(800 + simState.speed * 35 + accel * 1200, 750, 6500);
        simState.coolant = clamp(simState.coolant + (simState.load * 0.02) - 0.005, 70, 102);
        simState.oil = clamp(simState.oil + (simState.load * 0.015) - 0.003, 65, 115);
        simState.intake = clamp(20 + simState.load * 15 + Math.sin(simState.t / 5) * 2, 18, 50);
        simState.voltage = clamp(13.4 + Math.sin(simState.t / 4) * 0.2, 12.6, 14.6);
        simState.fuelTrim = clamp(Math.sin(simState.t / 6) * 6, -12, 12);
      }

      function generateValue(label) {
        const name = label.toLowerCase();
        if (name.includes("rpm") || name.includes("engine speed")) {
          return Math.round(simState.rpm);
        }
        if (name.includes("vehicle speed") || name.includes("speed")) {
          return Math.round(simState.speed);
        }
        if (name.includes("coolant")) {
          return Number(simState.coolant.toFixed(1));
        }
        if (name.includes("oil")) {
          return Number(simState.oil.toFixed(1));
        }
        if (name.includes("intake")) {
          return Number(simState.intake.toFixed(1));
        }
        if (name.includes("temperature") || name.includes("temp")) {
          return Number((25 + simState.load * 30).toFixed(1));
        }
        if (name.includes("voltage") || name.includes("battery") || name.includes("(v)")) {
          return Number(simState.voltage.toFixed(2));
        }
        if (name.includes("oxygen") || name.includes("mv")) {
          return Math.round(100 + simState.load * 700 + Math.sin(simState.t * 3) * 50);
        }
        if (name.includes("throttle") || name.includes("position")) {
          return Number((simState.load * 80).toFixed(1));
        }
        if (name.includes("duty") || name.includes("%")) {
          return Number((simState.load * 100).toFixed(1));
        }
        if (name.includes("ms")) {
          return Number((simState.load * 8 + 1).toFixed(2));
        }
        if (name.includes("pressure")) {
          return Number((20 + simState.load * 60).toFixed(1));
        }
        if (name.includes("status") || name.includes("switch") || name.includes("relay") || name.includes("signal")) {
          return simState.speed > 2 ? 1 : 0;
        }
        if (name.includes("trim")) {
          return Number(simState.fuelTrim.toFixed(1));
        }
        if (name.includes("ignition")) {
          return Number((10 + simState.load * 18 + Math.sin(simState.t / 4) * 2).toFixed(1));
        }
        if (name.includes("camshaft") || name.includes("cvvt")) {
          return Number((20 + simState.load * 40).toFixed(1));
        }
        return Number((simState.load * 100).toFixed(1));
      }

      function startSimulation() {
        if (!labelsReady) {
          setStatus("No labels yet", "warn");
          return;
        }
        simulateOn = true;
        simulateButton.textContent = "Stop simulation";
        setStatus("Simulation", "warn");
        simulateTimer = setInterval(() => {
          updateSimState();
          const labels = baseLabels.length ? baseLabels : currentLabels;
          const values = labels.map(generateValue);
          updateValues({ ts: Date.now(), values });
          sampleCount += 1;
        }, 200);
      }

      function stopSimulation() {
        simulateOn = false;
        simulateButton.textContent = "Start simulation";
        if (simulateTimer) {
          clearInterval(simulateTimer);
          simulateTimer = null;
        }
        fetchStatus();
      }

          return;

        startSimulation();
      }

      function loadValueScale() {
        try {
          const raw = localStorage.getItem(valueScaleKey);
          if (!raw) {
            return;
          }
          const items = JSON.parse(raw);
          if (Array.isArray(items)) {
            valueScaleMap.clear();
            items.forEach((entry) => {
              if (!Array.isArray(entry) || entry.length < 3) {
                return;
              }
              const label = entry[0];
              const min = Number(entry[1]);
              const max = Number(entry[2]);
              const hasMin = Number.isFinite(min);
              const hasMax = Number.isFinite(max);
              if (typeof label == "string" && (hasMin || hasMax)) {
                valueScaleMap.set(label, { min: hasMin ? min : null, max: hasMax ? max : null });
              }
            });
          }
        } catch (error) {
        }
      }

      function loadValueDecimals() {
        try {
          const raw = localStorage.getItem(valueStorageKey);
          if (!raw) {
            return;
          }
          const items = JSON.parse(raw);
          if (Array.isArray(items)) {
            valueDecimalsMap.clear();
            items.forEach(([label, decimals]) => {

      function parseNumberInput(raw) {
        if (typeof raw !== "string") {
          return null;
        }
        const normalized = raw.replace(",", ".").trim();
        if (!normalized) {
          return null;
        }
        const num = Number(normalized);
        return Number.isFinite(num) ? num : null;
      }

      function applyValueOptions() {
        if (!activeValueLabel) {
          return;
        }
        const raw = valueDecimals.value.trim();
        if (raw == "") {
          valueDecimalsMap.delete(activeValueLabel);
        } else {
          const parsed = Number(raw);
          if (Number.isInteger(parsed) && parsed >= 0) {
            valueDecimalsMap.set(activeValueLabel, parsed);
          }
        }
        saveValueDecimals();
        if (valueScaleMin && valueScaleMax) {
          const minVal = parseNumberInput(valueScaleMin.value);
          const maxVal = parseNumberInput(valueScaleMax.value);
          const hasMin = Number.isFinite(minVal);
          const hasMax = Number.isFinite(maxVal);
          if (!hasMin && !hasMax) {
            valueScaleMap.delete(activeValueLabel);
          } else {
            valueScaleMap.set(activeValueLabel, { min: hasMin ? minVal : null, max: hasMax ? maxVal : null });
          }
          saveValueScale();
        }
        if (valueAlias) {
          const aliasValue = valueAlias.value.trim();
          if (aliasValue) {
            aliasMap.set(activeValueLabel, aliasValue);
          } else {
            aliasMap.delete(activeValueLabel);
          }
          saveAliasMap();
        }
        if (lastSample) {
          updateValues(lastSample);
        }
        buildPanelGrid();
        syncHistoryDatasets();
        closeValueOptions();

      function buildOptionGroup(title, labels) {
        if (!labels.length) {

        const group = document.createElement("section");
        group.className = "overlay-group";

        const heading = document.createElement("div");
        heading.className = "overlay-group-title";
        heading.textContent = title;
        group.appendChild(heading);

        labels.forEach((label) => {
          const item = document.createElement("label");
          item.className = "overlay-item";
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = !hiddenLabels.has(label);
          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              hiddenLabels.delete(label);
            } else {
              hiddenLabels.add(label);
            }
            saveHiddenLabels();
            buildTable(currentLabels);
          });
          const text = document.createElement("span");
          text.textContent = label;
          item.appendChild(checkbox);
          item.appendChild(text);
          group.appendChild(item);
        });

      }

      function buildPanelGrid() {
        if (!panelGrid) {
          return;
        }
        ensurePanelAssignments();
        panelGrid.innerHTML = "";
        panelGrid.style.gridTemplateColumns = `repeat(${panelConfig.cols}, minmax(0, 1fr))`;
        panelCells = [];
        panelConfig.assignments.forEach((label, index) => {
          const cell = document.createElement("div");
          cell.className = "panel-cell";
          const labelEl = document.createElement("div");
          labelEl.className = "panel-label";
          if (label) {
            labelEl.dataset.label = label;
          }
          const dotEl = document.createElement("span");
          dotEl.className = "panel-dot";
          dotEl.style.background = label ? getLabelColor(label) : "rgba(255, 255, 255, 0.25)";
          dotEl.style.boxShadow = label ? `0 0 8px ${getLabelColor(label)}` : "none";
          dotEl.style.opacity = label && isSeriesHidden(label) ? "0.25" : "1";
          const textEl = document.createElement("span");
          textEl.textContent = label ? displayName(label) : `Cell ${index + 1}`;
          labelEl.appendChild(dotEl);
          labelEl.appendChild(textEl);
          const valueEl = document.createElement("div");
          valueEl.className = "panel-value";
          valueEl.textContent = "--";
          const gear = document.createElement("button");
          gear.className = "icon-button panel-gear";
          gear.type = "button";
          gear.title = "Settings";
          gear.innerHTML = "<svg viewBox='0 0 24 24' aria-hidden='true'><path d='M12 8.6a3.4 3.4 0 1 0 0 6.8 3.4 3.4 0 0 0 0-6.8zm9.3 3.4c0-.4 0-.7-.1-1l2-1.6-2-3.4-2.4 1a7.7 7.7 0 0 0-1.7-1l-.3-2.7H9.2l-.3 2.7c-.6.3-1.2.6-1.7 1l-2.4-1-2 3.4 2 1.6c-.1.3-.1.7-.1 1s0 .7.1 1l-2 1.6 2 3.4 2.4-1c.5.4 1.1.7 1.7 1l.3 2.7h7.6l.3-2.7c.6-.3 1.2-.6 1.7-1l2.4 1 2-3.4-2-1.6c.1-.3.1-.7.1-1z'/></svg>";
          gear.addEventListener("click", () => openCellOptions(index));
          cell.appendChild(labelEl);
          cell.appendChild(valueEl);
          cell.appendChild(gear);
          panelGrid.appendChild(cell);
          panelCells.push({ labelEl, valueEl });
        });
        if (lastSample) {
          updatePanelValues(lastSample);
        }
        syncHistoryDatasets();
      }

      function applyPanelSplit(value) {
        if (!panelGrid || !panelBottom) {
          return;
        }
        const v = Math.max(20, Math.min(80, Number(value) || 50));
        panelGrid.style.flex = `${100 - v} 1 0`;
        panelBottom.style.flex = `${v} 1 0`;
        try {
          localStorage.setItem(panelSplitKey, String(v));
        } catch (error) {
        }
      }

      function loadPanelSplit() {
        try {
          const raw = localStorage.getItem(panelSplitKey);
          if (raw) {
            return Number(raw);
          }
        } catch (error) {
        }
        return 50;
      }

      function openPanelSettings() {
        if (!panelOverlay) {
          return;
        }
        panelRows.value = panelConfig.rows;
        panelCols.value = panelConfig.cols;
        panelOverlay.classList.add("active");
      }

      function closePanelSettings() {
        if (!panelOverlay) {
          return;
        }
        panelOverlay.classList.remove("active");
      }

      function applyPanelSettings() {
        const rows = Number(panelRows.value);
        const cols = Number(panelCols.value);
        if (Number.isInteger(rows) && rows > 0) {
          panelConfig.rows = Math.max(1, Math.min(6, rows));
        }
        if (Number.isInteger(cols) && cols > 0) {
          panelConfig.cols = Math.max(1, Math.min(6, cols));
        }
        ensurePanelAssignments();
        savePanelConfig();
        buildPanelGrid();
        closePanelSettings();
      }

      function updatePanelValues(sample) {
        if (!panelCells.length || !sample) {
          return;
        }
        panelConfig.assignments.forEach((label, index) => {
          const cell = panelCells[index];
          if (!cell) {
            return;
          }
          const dotEl = cell.labelEl.querySelector(".panel-dot");
          const textEl = cell.labelEl.querySelector("span:last-child");
          if (dotEl) {
            dotEl.style.background = label ? getLabelColor(label) : "rgba(255, 255, 255, 0.25)";
            dotEl.style.boxShadow = label ? `0 0 8px ${getLabelColor(label)}` : "none";
            dotEl.style.opacity = label && isSeriesHidden(label) ? "0.25" : "1";
          }
          if (textEl) {
            textEl.textContent = label ? displayName(label) : `Cell ${index + 1}`;
          }
          if (!label || !labelIndexMap.has(label)) {
            cell.valueEl.textContent = "--";
            return;
          }
          const value = sample.values[labelIndexMap.get(label)];
          cell.valueEl.textContent = formatValue(value, label);
        });
      }

      function openCellOptions(index) {
        if (!cellOverlay || !cellSelect) {
          return;
        }
        activePanelCellIndex = index;
        if (cellTitle) {
          cellTitle.textContent = `Cellule ${index + 1}`;
        }
        cellSelect.innerHTML = "";
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "(Vide)";
        cellSelect.appendChild(empty);
        currentLabels.forEach((label) => {
          if (hiddenLabels.has(label)) {
            return;
          }
          const option = document.createElement("option");
          option.value = label;
          option.textContent = displayName(label);
          cellSelect.appendChild(option);
        });
        const current = panelConfig.assignments[index] || "";
        cellSelect.value = current;
        cellOverlay.classList.add("active");
      }

      function closeCellOptions() {
        if (!cellOverlay) {
          return;
        }
        cellOverlay.classList.remove("active");
        activePanelCellIndex = null;
      }

      function applyCellOptions() {
        if (activePanelCellIndex === null) {
          return;
        }
        const value = cellSelect.value;
        panelConfig.assignments[activePanelCellIndex] = value;
        savePanelConfig();
        buildPanelGrid();
        closeCellOptions();
      }

      function hashLabel(label) {
        let hash = 0;
        for (let i = 0; i < label.length; i += 1) {
          hash = (hash << 5) - hash + label.charCodeAt(i);
          hash |= 0;
        }
        return Math.abs(hash);
      }

            function getLabelColor(label) {
        if (!label) {
          return "rgba(255, 255, 255, 0.25)";
        }
        if (chartColorMap.has(label)) {
          return chartColorMap.get(label);
        }
        return "rgba(255, 255, 255, 0.25)";
      }

      function isRpmLabel(label) {
        const name = label.toLowerCase();
        return name.includes("rpm") || name.includes("engine speed");
      }

      function isAfrLabel(label) {
        const name = label.toLowerCase();
        return name.includes("air/fuel") || name.includes("afr");
      }

      function scaleIdForLabel(label) {
        return `s${hashLabel(label)}`;
      }

      function applyFixedScales() {
        if (!historyChart) {
          return;
        }
        const labels = getPanelLabels().filter((label) => !isSeriesHidden(label));
        labels.forEach((label) => {
          const scale = valueScaleMap.get(label);
          if (!scale) {
            historyChart.setScale(scaleIdForLabel(label), { min: null, max: null });
            return;
          }
          const min = Number.isFinite(scale.min) ? scale.min : null;
          const max = Number.isFinite(scale.max) ? scale.max : null;
          historyChart.setScale(scaleIdForLabel(label), { min, max });
        });
      }

      function saveHiddenSeries() {
        try {
          localStorage.setItem(hiddenSeriesKey, JSON.stringify(Array.from(hiddenSeries.values())));
        } catch (error) {
        }
      }

      function loadHiddenSeries() {
        try {
          const raw = localStorage.getItem(hiddenSeriesKey);
          if (!raw) {
            return;
          }
          const items = JSON.parse(raw);
          if (Array.isArray(items)) {
            hiddenSeries.clear();
            items.forEach((item) => {
              if (typeof item === "string") {
                hiddenSeries.add(item);
              }
            });
          }
        } catch (error) {
        }
      }

      function isSeriesHidden(label) {
        return hiddenSeries.has(label);
      }

      function toggleSeries(label) {
        if (hiddenSeries.has(label)) {
          hiddenSeries.delete(label);
        } else {
          hiddenSeries.add(label);
        }
        saveHiddenSeries();
        syncHistoryDatasets();
      }

      function getPanelLabels() {
        const labels = [];
        panelConfig.assignments.forEach((label) => {
          if (!label || hiddenLabels.has(label)) {
            return;
          }
          if (!labels.includes(label)) {
            labels.push(label);
          }
        });
        return labels;
      }

      function ensureHistorySeries(labels) {
        labels.forEach((label) => {
          if (!historySeries.has(label)) {
            const series = new Array(historyTimestamps.length).fill(null);
            historySeries.set(label, series);
          }
        });
        Array.from(historySeries.keys()).forEach((label) => {
          if (!labels.includes(label)) {
            historySeries.delete(label);
          }
        });
      }

      function trimHistory(now) {
        const cutoff = now - historyWindowMs;
        let removeCount = 0;
        while (removeCount < historyTimestamps.length && historyTimestamps[removeCount] < cutoff) {
          removeCount += 1;
        }
        if (removeCount > 0) {
          historyTimestamps.splice(0, removeCount);
          historySeries.forEach((series) => {
            series.splice(0, removeCount);
          });
        }
      }

      function getHistoryBounds() {
        if (!historyTimestamps.length) {
          return { min: null, max: null };
        }
        return {
          min: historyTimestamps[0],
          max: historyTimestamps[historyTimestamps.length - 1],
        };
      }

      function buildUPlotSeries(labels) {
        chartColorMap.clear();
        const smoothPaths = window.uPlot && uPlot.paths && uPlot.paths.spline ? uPlot.paths.spline() : null;
        const series = [
          {
            label: "Time",
            value: (u, v) => new Date(v).toLocaleTimeString(),
          },
        ];
        labels.forEach((label, index) => {
          const color = chartColors[index % chartColors.length];
          chartColorMap.set(label, color);
          series.push({
            label: displayName(label),
            stroke: color,
            width: 2,
            scale: scaleIdForLabel(label),
            paths: smoothPaths || undefined,
          });
        });
        return series;
      }

      function buildUPlotData(labels) {
        const data = [historyTimestamps];
        labels.forEach((label) => {
          data.push(historySeries.get(label) || []);
        });
        return data;
      }

      function destroyHistoryChart() {
        if (chartResizeObserver) {
          chartResizeObserver.disconnect();
          chartResizeObserver = null;
        }
        if (historyChart) {
          historyChart.destroy();
          historyChart = null;
        }
      }

      function createHistoryChart(labels) {
        if (!chartRoot || !window.uPlot) {
          return null;
        }
        const scales = { x: { time: false }, y: { auto: true } };
        labels.forEach((label) => {
          scales[scaleIdForLabel(label)] = { auto: true };
        });
        const series = buildUPlotSeries(labels);
        const data = buildUPlotData(labels);
        const width = chartRoot.clientWidth || 640;
        const height = chartRoot.clientHeight || 240;
        const chart = new uPlot({
          width,
          height,
          series,
          scales,
          axes: [
            {
              grid: { show: true, stroke: "rgba(255,255,255,0.05)" },
              values: (u, ticks) => ticks.map((value) => {
                if (!lastSample) {
                  return "";
                }
                const baseTs = chartLastTs ?? (lastSample ? lastSample.ts : null);
                if (!baseTs) {
                  return "";
                }
                const delta = Math.round((value - baseTs) / 1000);
                return `${delta}s`;
              }),
              stroke: "rgba(255,255,255,0.6)",
            },
            {
              show: false,
              scale: "y",
            },
          ],
          cursor: {
            y: false,
            points: { show: false },
          },
          legend: { show: false },
          hooks: {
            setCursor: [
              (u) => {
                if (!chartTooltip) {
                  return;
                }
                const idx = u.cursor.idx;
                if (idx === null || idx === undefined || idx < 0) {
                  chartTooltip.style.opacity = 0;
                  return;
                }
                const ts = u.data[0][idx];
                if (!Number.isFinite(ts)) {
                  chartTooltip.style.opacity = 0;
                  return;
                }
                let html = `<strong>${new Date(ts).toLocaleTimeString()}</strong>`;
                for (let i = 1; i < u.series.length; i += 1) {
                  const rawLabel = labels[i - 1];
                  const value = u.data[i][idx];
                  if (!Number.isFinite(value)) {
                    continue;
                  }
                  html += `<span>${displayName(rawLabel)}: ${formatValue(value, rawLabel)}</span>`;
                }
                chartTooltip.innerHTML = html;
                const left = u.cursor.left + u.bbox.left;
                const top = u.cursor.top + u.bbox.top;
                chartTooltip.style.left = `${left}px`;
                chartTooltip.style.top = `${top}px`;
                chartTooltip.style.opacity = 1;
              },
            ],
            draw: [
              (u) => {
                const idx = u.cursor.idx;
                if (idx === null || idx === undefined) {
                  return;
                }
                const ts = u.data[0][idx];
                if (!Number.isFinite(ts)) {
                  return;
                }
                const x = u.valToPos(ts, "x", true);
                u.ctx.save();
                u.ctx.strokeStyle = "rgba(255,255,255,0.2)";
                u.ctx.beginPath();
                u.ctx.moveTo(Math.round(x) + 0.5, u.bbox.top);
                u.ctx.lineTo(Math.round(x) + 0.5, u.bbox.top + u.bbox.height);
                u.ctx.stroke();
                u.ctx.restore();
              },
            ],
          },
        }, data, chartRoot);

        chartResizeObserver = new ResizeObserver((entries) => {
          entries.forEach((entry) => {
            const { width, height } = entry.contentRect;
            if (width > 0 && height > 0 && historyChart) {
              historyChart.setSize({ width, height });
            }
          });
        });
        chartResizeObserver.observe(chartRoot);

        return chart;
      }

      function refreshPanelDots() {
        panelCells.forEach((cell) => {
          const label = cell.labelEl.dataset.label;
          const dotEl = cell.labelEl.querySelector(".panel-dot");
          if (!dotEl) {
            return;
          }
          dotEl.style.background = label ? getLabelColor(label) : "rgba(255, 255, 255, 0.25)";
          dotEl.style.boxShadow = label ? `0 0 8px ${getLabelColor(label)}` : "none";
          dotEl.style.opacity = label && isSeriesHidden(label) ? "0.25" : "1";
        });
      }

      function sameLabels(nextLabels, currentLabels) {
        if (nextLabels.length !== currentLabels.length) {
          return false;
        }
        for (let i = 0; i < nextLabels.length; i += 1) {
          if (nextLabels[i] !== currentLabels[i]) {
            return false;
          }
        }
        return true;
      }

      function renderChart() {
        const labels = getPanelLabels();
        ensureHistorySeries(labels);
        const visibleLabels = labels.filter((label) => !isSeriesHidden(label));
        const visibleNames = visibleLabels.map((label) => displayName(label));
        if (!historyChart || !sameLabels(visibleLabels, chartSeriesLabels) || !sameLabels(visibleNames, chartSeriesNames)) {
          destroyHistoryChart();
          historyChart = createHistoryChart(visibleLabels);
          chartSeriesLabels = visibleLabels.slice();
          chartSeriesNames = visibleNames.slice();
        } else if (historyChart) {
          historyChart.setData(buildUPlotData(visibleLabels));
        }
        if (!historyChart) {
          return;
        }
        applyFixedScales();
        refreshPanelDots();
      }

      function scheduleChartRender() {
        if (chartRenderPending) {
          return;
        }
        chartRenderPending = true;
        requestAnimationFrame((ts) => {
          chartRenderPending = false;
          if (ts - chartLastRender < chartRenderIntervalMs) {
            scheduleChartRender();
            return;
          }
          chartLastRender = ts;
          renderChart();
        });
      }

      function syncHistoryDatasets() {
        renderChart();
      }

      function updateHistoryChart(sample) {
        if (!sample) {
          return;
        }
        if (chartPaused) {
          if (pauseStartTs === null) {
            pauseStartTs = sample.ts;
          }
          pauseLatestTs = sample.ts;
          return;
        }
        if (pauseStartTs !== null && pauseLatestTs !== null) {
          pauseOffsetMs += pauseLatestTs - pauseStartTs;
          pauseStartTs = null;
          pauseLatestTs = null;
        }
        const labels = getPanelLabels();
        ensureHistorySeries(labels);
        const adjustedTs = sample.ts - pauseOffsetMs;
        historyTimestamps.push(adjustedTs);
        chartLastTs = adjustedTs;
        labels.forEach((label) => {
          const idx = labelIndexMap.get(label);
          const series = historySeries.get(label);
          if (!series) {
            return;
          }
          let value = null;
          if (idx !== undefined) {
            const raw = Number(sample.values[idx]);
            value = Number.isFinite(raw) ? raw : null;
          }
          series.push(value);
        });
        trimHistory(adjustedTs);
        scheduleChartRender();
      }

      function connect() {
        const source = new EventSource("/stream");
        setStatus("Connecting...", "warn");

        source.addEventListener("labels", (event) => {
          const labels = JSON.parse(event.data);
          setBaseLabels(labels);
          buildTable(extendLabels(getCombinedLabels()));
        });

        source.addEventListener("sample", (event) => {
          if (simulateOn) {
            return;
          }
          const sample = JSON.parse(event.data);
          updateValues(sample);
          sampleCount += 1;
        });

        source.addEventListener("error", () => {
          setStatus("Reconnecting...", "warn");
        });
      }

      loadHiddenLabels();
      loadValueDecimals();
      loadValueScale();
      loadAliasMap();
      loadPanelConfig();
      loadHiddenSeries();
      buildPanelGrid();
      applyPanelSplit(loadPanelSplit());
      syncHistoryDatasets();
      connect();
      fetchStatus();
      setInterval(fetchStatus, 3000);
      connectButton.addEventListener("click", requestConnect);
      if (simulateButton) {
        simulateButton.addEventListener("click", toggleSimulation);
      }
      if (bleConnectButton) {
        bleConnectButton.addEventListener("click", connectBle);
      }
      if (optionsButton) {
        optionsButton.addEventListener("click", openOptions);
      }
      if (optionsClose) {
        optionsClose.addEventListener("click", closeOptions);
      }
      if (optionsOverlay) {
        optionsOverlay.addEventListener("click", (event) => {
          if (event.target === optionsOverlay) {
            closeOptions();
          }
        });
      }
      if (optionsShowAll) {
        optionsShowAll.addEventListener("click", showAllOptions);
      }
      if (optionsHideAll) {
        optionsHideAll.addEventListener("click", hideAllOptions);
      }
      if (bleLogButton) {
        bleLogButton.addEventListener("click", () => {
          if (bleLogOverlay) {
            bleLogOverlay.classList.add("active");
          }
        });
      }
      if (bleLogClose) {
        bleLogClose.addEventListener("click", () => {
          if (bleLogOverlay) {
            bleLogOverlay.classList.remove("active");
          }
        });
      }
      if (bleLogOverlay) {
        bleLogOverlay.addEventListener("click", (event) => {
          if (event.target === bleLogOverlay) {
            bleLogOverlay.classList.remove("active");
          }
        });
      }
      if (valueSave) {
        valueSave.addEventListener("click", applyValueOptions);
      }
      if (valueClear) {
        valueClear.addEventListener("click", resetValueOptions);
      }
      if (valueClose) {
        valueClose.addEventListener("click", closeValueOptions);
      }
      if (valueOverlay) {
        valueOverlay.addEventListener("click", (event) => {
          if (event.target === valueOverlay) {
            closeValueOptions();
          }
        });
      }
      if (panelSettings) {
        panelSettings.addEventListener("click", openPanelSettings);
      }
      if (panelSplitter) {
        const onMove = (event) => {
          if (!panelGrid || !panelBottom) {
            return;
          }
          const top = panelGrid.getBoundingClientRect().top;
          const bottom = panelBottom.getBoundingClientRect().bottom;
          const total = bottom - top;
          if (total <= 0) {
            return;
          }
          const clientY = event.clientY;
          const graphHeight = bottom - clientY;
          const percent = (graphHeight / total) * 100;
          applyPanelSplit(percent);
        };
        const onUp = (event) => {
          document.removeEventListener("pointermove", onMove);
          document.removeEventListener("pointerup", onUp);
          panelSplitter.releasePointerCapture(event.pointerId);
        };
        panelSplitter.addEventListener("pointerdown", (event) => {
          panelSplitter.setPointerCapture(event.pointerId);
          onMove(event);
          document.addEventListener("pointermove", onMove);
          document.addEventListener("pointerup", onUp);
        });
      }
      if (panelApply) {
        panelApply.addEventListener("click", applyPanelSettings);
      }
      if (panelClose) {
        panelClose.addEventListener("click", closePanelSettings);
      }
      if (panelOverlay) {
        panelOverlay.addEventListener("click", (event) => {
          if (event.target === panelOverlay) {
            closePanelSettings();
          }
        });
      }
      if (cellApply) {
        cellApply.addEventListener("click", applyCellOptions);
      }
      if (cellClose) {
        cellClose.addEventListener("click", closeCellOptions);
      }
      if (cellOverlay) {
        cellOverlay.addEventListener("click", (event) => {
          if (event.target === cellOverlay) {
            closeCellOptions();
          }
        });
      }
      if (chartToggle) {
        chartToggle.addEventListener("click", () => {
          chartPaused = !chartPaused;
          chartToggle.textContent = chartPaused ? "Play" : "Pause";
        });
      }

      setInterval(() => {
        const now = performance.now();
        const elapsed = now - lastHzTime;
        if (elapsed >= 1000) {
          const hz = (sampleCount / (elapsed / 1000)).toFixed(1);
          statusHz.textContent = `Hz: ${hz}`;
          sampleCount = 0;
          lastHzTime = now;
        }
      }, 250);

      document.addEventListener("click", (event) => {
        const labelEl = event.target.closest(".panel-label");
        if (!labelEl) {
          return;
        }
        const label = labelEl.dataset.label;
        if (!label) {
          return;
        }
        toggleSeries(label);
        buildPanelGrid();
      });

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          const target = tab.dataset.tab;
          tabs.forEach((btn) => btn.classList.toggle("active", btn === tab));
          panels.forEach((panel) =>
            panel.classList.toggle("active", panel.dataset.panel === target)
          );
          if (target === "overview" && historyChart && chartRoot) {
            const width = chartRoot.clientWidth;
            const height = chartRoot.clientHeight;
            if (width > 0 && height > 0) {
              historyChart.setSize({ width, height });
            }
          }
        });
      });
    </script>
  </body>
</html>
